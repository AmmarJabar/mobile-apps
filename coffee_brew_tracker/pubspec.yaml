name: coffee_brew_tracker
description: A modern offline-first coffee brewing tracker for pour-over and espresso.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.3
  path: ^1.9.0

  # Data Export
  csv: ^6.0.0
  share_plus: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/applogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
